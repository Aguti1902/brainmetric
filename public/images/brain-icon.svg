<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Hemisferio izquierdo del cerebro -->
  <path d="
    M 50 22
    C 38 22, 26 28, 22 38
    C 18 46, 19 54, 22 60
    C 24 65, 26 68, 28 70
    C 30 72, 33 73, 36 73
    C 38 73, 40 72, 42 71
    C 44 70, 46 69, 48 69
    L 48 22
    Z
  " fill="url(#brain)" opacity="0.95"/>

  <!-- Hemisferio derecho del cerebro -->
  <path d="
    M 50 22
    C 62 22, 74 28, 78 38
    C 82 46, 81 54, 78 60
    C 76 65, 74 68, 72 70
    C 70 72, 67 73, 64 73
    C 62 73, 60 72, 58 71
    C 56 70, 54 69, 52 69
    L 52 22
    Z
  " fill="url(#brain)" opacity="0.95"/>

  <!-- División central (surco interhemisférico) -->
  <line x1="50" y1="22" x2="50" y2="69" stroke="#6366F1" stroke-width="1.5" opacity="0.4"/>

  <!-- Cerebelo -->
  <path d="
    M 36 73
    C 34 74, 32 76, 32 79
    C 32 82, 34 84, 37 84
    C 40 84, 43 82, 45 80
    C 47 78, 48 76, 48 74
    L 48 69
    C 46 69, 44 70, 42 71
    C 40 72, 38 73, 36 73
    Z
  " fill="url(#brain)" opacity="0.85"/>
  <path d="
    M 64 73
    C 66 74, 68 76, 68 79
    C 68 82, 66 84, 63 84
    C 60 84, 57 82, 55 80
    C 53 78, 52 76, 52 74
    L 52 69
    C 54 69, 56 70, 58 71
    C 60 72, 62 73, 64 73
    Z
  " fill="url(#brain)" opacity="0.85"/>

  <!-- Surcos cerebrales - hemisferio izquierdo -->
  <path d="M 30 36 C 32 34, 36 33, 40 35" stroke="#6366F1" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 24 46 C 27 44, 32 43, 37 45" stroke="#6366F1" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 24 56 C 27 54, 32 53, 38 55" stroke="#6366F1" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 28 65 C 31 63, 36 62, 42 64" stroke="#6366F1" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Surcos cerebrales - hemisferio derecho -->
  <path d="M 70 36 C 68 34, 64 33, 60 35" stroke="#6366F1" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 76 46 C 73 44, 68 43, 63 45" stroke="#6366F1" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 76 56 C 73 54, 68 53, 62 55" stroke="#6366F1" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 72 65 C 69 63, 64 62, 58 64" stroke="#6366F1" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Surcos cerebelo -->
  <path d="M 34 77 C 37 76, 41 76, 44 77" stroke="#6366F1" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 66 77 C 63 76, 59 76, 56 77" stroke="#6366F1" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
